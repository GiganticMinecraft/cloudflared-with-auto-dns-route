name: Build and publish cloudflared-with-auto-dns-route docker image
on:
  push:
    branches:
    - main
    paths:
    - 'image-definition/**'
    - '.github/workflows/publish.yml'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      image_name: cloudflared-with-auto-dns-route

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: extract_cloudflared_image_tag
        run: |
          image_tag="$(grep -P -o "(?<=^FROM cloudflare/cloudflared\:)([0-9]+\.[0-9]+\.[0-9]+)" image-definition/Dockerfile)"
          echo "image_tag=${image_tag}" >> $GITHUB_OUTPUT

      # Docker does not allow uppercase letters for image name, so we must replace repository_owner and so on
      - id: prepare_image_id
        name: Prepare image id's components
        run: |
          lowercase_id=ghcr.io/${{ github.repository_owner }}/${{ env.image_name }}
          echo "lowercase_id=$(echo $lowercase_id | tr '[A-Z]' '[a-z]')" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ steps.prepare_image_id.outputs.lowercase_id }}
          tags: |
            type=sha
            type=raw,value=${{ steps.extract_cloudflared_image_tag.outputs.image_tag }}
          labels: |
            org.opencontainers.image.title=cloudflared-with-auto-dns-route
            org.opencontainers.image.description=Cloudflare Tunnel client with automatic DNS route configuration
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/GiganticMinecraft/cloudflared-with-auto-dns-route
            org.opencontainers.image.vendor=GiganticMinecraft

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./image-definition
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image with Cosign
        run: cosign sign --yes ${{ steps.prepare_image_id.outputs.lowercase_id }}@${{ steps.build.outputs.digest }}
