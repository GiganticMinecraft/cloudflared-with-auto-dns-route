name: Build and publish cloudflared-with-auto-dns-route docker image
on:
  push:
    branches:
    - main
    paths:
    - 'image-definition/**'
    - '.github/workflows/publish.yml'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      image_name: cloudflared-with-auto-dns-route

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: extract_cloudflared_image_tag
        run: |
          image_tag="$(grep -P -o "(?<=^FROM cloudflare/cloudflared\:)([0-9]+\.[0-9]+\.[0-9]+)" image-definition/Dockerfile)"
          echo "image_tag=${image_tag}" >> $GITHUB_OUTPUT

      # Docker does not allow uppercase letters for image name, so we must replace repository_owner and so on
      - id: prepare_image_id
        name: Prepare image id's components
        run: |
          lowercase_id=ghcr.io/${{ github.repository_owner }}/${{ env.image_name }}
          echo "lowercase_id=$(echo $lowercase_id | tr '[A-Z]' '[a-z]')" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ steps.prepare_image_id.outputs.lowercase_id }}
          tags: |
            type=sha
            type=raw,value=${{ steps.extract_cloudflared_image_tag.outputs.image_tag }}
          labels: |
            org.opencontainers.image.title=cloudflared-with-auto-dns-route
            org.opencontainers.image.description=Cloudflare Tunnel client with automatic DNS route configuration
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/GiganticMinecraft/cloudflared-with-auto-dns-route
            org.opencontainers.image.vendor=GiganticMinecraft

      - name: Build and push
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ./image-definition
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign
        run: cosign sign --yes ${{ steps.prepare_image_id.outputs.lowercase_id }}@${{ steps.build.outputs.digest }}
